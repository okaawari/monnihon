version: '3.8'

services:
  # The Laravel application (PHP-FPM + Node.js)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: monnihon
        uid: 1000
    image: monnihon-app
    container_name: monnihon-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - monnihon-network

  # The Web Server (NGINX)
  web:
    image: nginx:stable-alpine
    container_name: monnihon-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - monnihon-network
    depends_on:
      - app

  # The Database (MySQL)
  db:
    image: mysql:8.0
    container_name: monnihon-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-monnihon}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - monnihon-network

  # Redis (Cache)
  redis:
    image: redis:alpine
    container_name: monnihon-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - monnihon-network

  # Mailpit (Development Mail Server)
  mailpit:
    image: axllent/mailpit
    container_name: monnihon-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - monnihon-network

networks:
  monnihon-network:
    driver: bridge

volumes:
  db-data:
    driver: local
